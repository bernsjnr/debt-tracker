<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Debt Tracker</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f5f5f3; --surface: #ffffff; --surface2: #f0efed;
    --border: rgba(0,0,0,0.1); --border2: rgba(0,0,0,0.18);
    --text: #1a1a1a; --text2: #6b6b6b; --text3: #9a9a9a;
    --radius: 12px; --radius-sm: 8px;
    --danger: #c0392b; --warn: #b8860b; --ok: #1a7a4a;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #141414; --surface: #1e1e1e; --surface2: #272727;
      --border: rgba(255,255,255,0.1); --border2: rgba(255,255,255,0.18);
      --text: #f0f0f0; --text2: #a0a0a0; --text3: #666;
      --danger: #e05a4a; --warn: #d4a030; --ok: #3ab870;
    }
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 0 0 4rem; }
  .app-header { background: var(--surface); border-bottom: 0.5px solid var(--border); padding: 1.25rem 1.5rem; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 50; }
  .app-title { font-size: 18px; font-weight: 500; }
  .app-sub { font-size: 12px; color: var(--text2); margin-top: 2px; }
  .btn { padding: 8px 16px; border-radius: var(--radius-sm); border: 0.5px solid var(--border2); font-size: 13px; cursor: pointer; background: transparent; color: var(--text); font-family: inherit; transition: background 0.15s; }
  .btn:hover { background: var(--surface2); }
  .btn-primary { background: var(--text); color: var(--bg); border-color: transparent; }
  .btn-primary:hover { opacity: 0.85; }
  .btn-sm { padding: 5px 12px; font-size: 12px; }
  .container { max-width: 680px; margin: 0 auto; padding: 1.5rem 1rem; }
  .summary-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 1.25rem; }
  @media (min-width: 480px) { .summary-grid { grid-template-columns: repeat(4, 1fr); } }
  .metric { background: var(--surface2); border-radius: var(--radius-sm); padding: 0.85rem 1rem; }
  .metric-label { font-size: 11px; color: var(--text2); margin-bottom: 4px; }
  .metric-value { font-size: 18px; font-weight: 500; }
  .metric-value.danger { color: var(--danger); }
  .metric-value.warn { color: var(--warn); }
  .metric-value.ok { color: var(--ok); }
  .tabs { display: flex; gap: 6px; margin-bottom: 1rem; overflow-x: auto; padding-bottom: 2px; }
  .tab { padding: 6px 16px; border-radius: 20px; border: 0.5px solid var(--border2); font-size: 13px; cursor: pointer; background: transparent; color: var(--text2); white-space: nowrap; font-family: inherit; transition: all 0.15s; }
  .tab.active { background: var(--text); color: var(--bg); border-color: transparent; }
  .section { display: none; }
  .section.active { display: block; }

  /* Overview */
  .card-list { display: flex; flex-direction: column; gap: 10px; }
  .card { background: var(--surface); border-radius: var(--radius); border: 0.5px solid var(--border); overflow: hidden; }
  .card-header { display: flex; justify-content: space-between; align-items: center; padding: 1rem 1.1rem; cursor: pointer; user-select: none; }
  .card-name { font-size: 14px; font-weight: 500; }
  .card-num { font-size: 12px; color: var(--text2); margin-top: 2px; }
  .card-right { text-align: right; }
  .card-balance { font-size: 20px; font-weight: 500; }
  .card-avail { font-size: 12px; color: var(--text2); }
  .apr-badge { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 20px; margin-left: 6px; vertical-align: middle; }
  .apr-high { background: #fce8e8; color: #a32d2d; }
  .apr-mid { background: #faeeda; color: #854f0b; }
  .apr-low { background: #eaf3de; color: #3b6d11; }
  .card-body { padding: 0 1.1rem 1rem; border-top: 0.5px solid var(--border); }
  .card-body.hidden { display: none; }
  .bar-wrap { margin-top: 0.85rem; }
  .bar-label { display: flex; justify-content: space-between; font-size: 12px; color: var(--text2); margin-bottom: 4px; }
  .bar-bg { height: 6px; background: var(--surface2); border-radius: 3px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 3px; }
  .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 0.85rem; }
  .stat-box { background: var(--surface2); border-radius: var(--radius-sm); padding: 0.6rem 0.75rem; }
  .stat-label { font-size: 11px; color: var(--text2); }
  .stat-val { font-size: 14px; font-weight: 500; margin-top: 2px; }
  .update-row { display: flex; align-items: center; gap: 8px; margin-top: 1rem; padding-top: 0.85rem; border-top: 0.5px solid var(--border); flex-wrap: wrap; }
  .update-row label { font-size: 12px; color: var(--text2); }
  .update-row input { flex: 1; min-width: 100px; padding: 6px 10px; font-size: 13px; border-radius: var(--radius-sm); border: 0.5px solid var(--border2); background: var(--surface); color: var(--text); font-family: inherit; }

  /* ── Allocator (income-allocator style) ── */
  .alloc-outer { background: #1c1c1c; border-radius: var(--radius); padding: 1.25rem 1.25rem 1rem; }
  .alloc-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 1.25rem; flex-wrap: wrap; gap: 10px; }
  .alloc-budget-block { }
  .alloc-budget-label { font-size: 11px; color: #666; letter-spacing: 0.04em; text-transform: uppercase; margin-bottom: 4px; }
  .alloc-budget-wrap { display: flex; align-items: baseline; gap: 2px; }
  .alloc-budget-sym { font-size: 20px; color: #888; }
  .alloc-budget-input { background: transparent; border: none; font-size: 32px; font-weight: 500; color: #fff; width: 150px; font-family: inherit; outline: none; }
  .alloc-budget-input::-webkit-inner-spin-button, .alloc-budget-input::-webkit-outer-spin-button { display: none; }
  .alloc-quick-btns { display: flex; gap: 6px; align-items: center; }
  .alloc-qbtn { padding: 5px 12px; border-radius: 20px; border: 0.5px solid #3a3a3a; font-size: 11px; cursor: pointer; background: transparent; color: #888; font-family: inherit; }
  .alloc-qbtn:hover { background: #2a2a2a; color: #ccc; }
  .alloc-total-pill { background: #2a2a2a; border-radius: 20px; padding: 4px 12px; font-size: 12px; color: #666; display: flex; align-items: center; gap: 6px; }
  .alloc-total-pill.ok { color: #3ab870; }
  .alloc-total-pill.over { color: #e05a4a; }

  .alloc-slot { margin-bottom: 0.1rem; }
  .alloc-slot-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
  .alloc-slot-left { display: flex; align-items: center; gap: 10px; }
  .alloc-slot-icon { width: 38px; height: 38px; border-radius: 9px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .alloc-slot-icon svg { width: 18px; height: 18px; }
  .alloc-slot-name { font-size: 14px; font-weight: 500; color: #e8e8e8; }
  .alloc-slot-sub { font-size: 11px; color: #555; margin-top: 2px; }
  .alloc-slot-right { text-align: right; display: flex; align-items: baseline; gap: 10px; }
  .alloc-slot-pct { font-size: 20px; font-weight: 500; }
  .alloc-slot-amt { font-size: 14px; color: #666; }
  .alloc-amt-input { background: transparent; border: none; font-size: 16px; font-weight: 500; width: 70px; text-align: right; font-family: inherit; outline: none; border-bottom: 1px solid #333; padding-bottom: 1px; -moz-appearance: textfield; }
  .alloc-amt-input::-webkit-inner-spin-button, .alloc-amt-input::-webkit-outer-spin-button { display: none; }
  .alloc-amt-input:focus { border-bottom-color: #666; }

  .alloc-lock-btn { background: transparent; border: none; cursor: pointer; padding: 4px; color: #444; display: flex; align-items: center; justify-content: center; border-radius: 6px; transition: color 0.15s, background 0.15s; }
  .alloc-lock-btn:hover { color: #888; background: #2a2a2a; }
  .alloc-lock-btn.locked { color: #e0a030; }
  .alloc-track-wrap.locked { opacity: 0.5; pointer-events: none; }
  .alloc-amt-input.locked { opacity: 0.5; pointer-events: none; }
  .alloc-track-bg { position: absolute; left: 11px; right: 11px; height: 6px; background: #2e2e2e; border-radius: 3px; }
  .alloc-track-min-fill { position: absolute; left: 11px; height: 6px; border-radius: 3px 0 0 3px; opacity: 0.45; }
  .alloc-track-extra-fill { position: absolute; height: 6px; border-radius: 0 3px 3px 0; }
  .alloc-track-min-marker { position: absolute; width: 2px; height: 16px; background: rgba(255,255,255,0.25); transform: translateX(-1px); z-index: 1; }
  .alloc-thumb { position: absolute; width: 26px; height: 26px; border-radius: 50%; transform: translateX(-50%); cursor: grab; touch-action: none; border: 3px solid #1c1c1c; z-index: 2; }
  .alloc-thumb:active { cursor: grabbing; transform: translateX(-50%) scale(1.1); }
  .alloc-track-legend { display: flex; gap: 12px; margin-bottom: 10px; }
  .atl { display: flex; align-items: center; gap: 5px; font-size: 10px; color: #555; }
  .atl-dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }

  .alloc-slot-stats { display: grid; grid-template-columns: repeat(3,1fr); gap: 6px; margin-bottom: 14px; }
  .ast { background: #242424; border-radius: 7px; padding: 6px 8px; }
  .ast-label { font-size: 10px; color: #555; }
  .ast-val { font-size: 12px; font-weight: 500; color: #bbb; margin-top: 2px; }
  .alloc-divider { height: 0.5px; background: #2a2a2a; margin: 0.5rem 0 1rem; }

  .alloc-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 0.5rem; }
  .alloc-footer-label { font-size: 11px; color: #555; }
  .alloc-footer-bar-wrap { flex: 1; margin: 0 12px; height: 4px; background: #2e2e2e; border-radius: 2px; overflow: hidden; }
  .alloc-footer-bar { height: 100%; border-radius: 2px; transition: width 0.1s; }
  .alloc-footer-val { font-size: 12px; font-weight: 500; }

  /* Payoff */
  .scenario-controls { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 1rem 1.25rem; margin-bottom: 1.25rem; }
  .ctrl-label { font-size: 12px; color: var(--text2); margin-bottom: 8px; }
  .ctrl-row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .extra-display { font-size: 22px; font-weight: 500; min-width: 60px; }
  .strat-pills { display: flex; gap: 6px; }
  .strat-pill { padding: 5px 12px; border-radius: 20px; border: 0.5px solid var(--border2); font-size: 12px; cursor: pointer; background: transparent; color: var(--text2); font-family: inherit; transition: all 0.15s; }
  .strat-pill.on { background: var(--text); color: var(--bg); border-color: transparent; }
  .headline-grid { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 10px; margin-bottom: 1.25rem; }
  .hl-card { background: var(--surface2); border-radius: var(--radius-sm); padding: 0.85rem 1rem; }
  .hl-label { font-size: 11px; color: var(--text2); margin-bottom: 4px; }
  .hl-val { font-size: 20px; font-weight: 500; }
  .hl-val.good { color: var(--ok); } .hl-val.bad { color: var(--danger); } .hl-val.warn { color: var(--warn); }
  .hl-sub { font-size: 11px; color: var(--text2); margin-top: 3px; }
  .phase-section-title { font-size: 13px; font-weight: 500; margin-bottom: 0.75rem; }
  .phase { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 1rem 1.25rem; margin-bottom: 10px; position: relative; overflow: hidden; }
  .phase-accent { position: absolute; left: 0; top: 0; bottom: 0; width: 3px; }
  .phase-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
  .phase-step { display: inline-flex; align-items: center; justify-content: center; width: 22px; height: 22px; border-radius: 50%; font-size: 11px; font-weight: 500; flex-shrink: 0; margin-right: 8px; }
  .phase-name { font-size: 14px; font-weight: 500; }
  .phase-tag { font-size: 11px; padding: 2px 8px; border-radius: 20px; display: inline-block; margin-top: 3px; }
  .phase-duration { font-size: 13px; font-weight: 500; color: var(--text2); text-align: right; white-space: nowrap; }
  .phase-body { margin-top: 0.85rem; padding-top: 0.85rem; border-top: 0.5px solid var(--border); }
  .phase-split { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .ps-box { background: var(--surface2); border-radius: var(--radius-sm); padding: 0.6rem 0.75rem; }
  .ps-label { font-size: 11px; color: var(--text2); }
  .ps-val { font-size: 13px; font-weight: 500; margin-top: 2px; }
  .what-happens { margin-top: 0.75rem; font-size: 12px; color: var(--text2); line-height: 1.6; padding: 0.6rem 0.75rem; background: var(--surface2); border-radius: var(--radius-sm); }
  .what-happens strong { font-weight: 500; color: var(--text); }
  .pb-wrap { margin-top: 0.75rem; }
  .pb-labels { display: flex; justify-content: space-between; font-size: 11px; color: var(--text2); margin-bottom: 4px; }
  .pb-bg { height: 5px; background: var(--surface2); border-radius: 3px; overflow: hidden; }
  .pb-fill { height: 100%; border-radius: 3px; }
  .vs-banner { background: var(--surface2); border-radius: var(--radius); padding: 1rem 1.25rem; margin-top: 1.25rem; }
  .vs-grid { display: grid; grid-template-columns: 1fr auto 1fr; gap: 12px; align-items: center; }
  .vs-col { text-align: center; }
  .vs-label { font-size: 11px; color: var(--text2); margin-bottom: 4px; }
  .vs-val { font-size: 18px; font-weight: 500; }
  .vs-sub { font-size: 11px; color: var(--text2); margin-top: 2px; }
  .vs-divider { font-size: 12px; color: var(--text2); text-align: center; }
  .vs-save { text-align: center; padding: 0.65rem 1rem; background: var(--surface); border-radius: var(--radius-sm); border: 0.5px solid var(--border); font-size: 12px; color: var(--text2); margin-top: 0.75rem; line-height: 1.6; }
  .vs-save strong { font-weight: 500; }

  /* History */
  .filter-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 0.85rem; }
  .filter-row select { padding: 6px 10px; font-size: 13px; border-radius: var(--radius-sm); border: 0.5px solid var(--border2); background: var(--surface); color: var(--text); font-family: inherit; }
  .history-list { background: var(--surface); border-radius: var(--radius); border: 0.5px solid var(--border); overflow: hidden; }
  .log-entry { display: flex; justify-content: space-between; align-items: center; padding: 0.85rem 1.1rem; border-bottom: 0.5px solid var(--border); font-size: 13px; }
  .log-entry:last-child { border-bottom: none; }
  .log-note { font-weight: 500; }
  .log-card { font-size: 11px; color: var(--text2); margin-top: 2px; }
  .log-date { font-size: 11px; color: var(--text3); }
  .log-amount { font-weight: 500; font-size: 14px; }
  .empty-state { padding: 2.5rem; text-align: center; font-size: 13px; color: var(--text2); }

  /* Modal */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; align-items: center; justify-content: center; padding: 1rem; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface); border-radius: var(--radius); padding: 1.5rem; width: 100%; max-width: 340px; border: 0.5px solid var(--border2); }
  .modal-title { font-size: 16px; font-weight: 500; margin-bottom: 1rem; }
  .field { display: flex; flex-direction: column; gap: 4px; }
  .field label { font-size: 12px; color: var(--text2); }
  .field input, .field select { padding: 8px 10px; font-size: 13px; border-radius: var(--radius-sm); border: 0.5px solid var(--border2); background: var(--surface); color: var(--text); font-family: inherit; width: 100%; }
  .modal-fields { display: flex; flex-direction: column; gap: 12px; }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 1.25rem; }
</style>
</head>
<body>

<div class="app-header">
  <div>
    <div class="app-title">Debt tracker</div>
    <div class="app-sub">3 cards · all APRs confirmed</div>
  </div>
  <button class="btn btn-primary btn-sm" onclick="openModal()">+ Log payment</button>
</div>

<div class="container">
  <div class="summary-grid" id="summary-grid"></div>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('overview',this)">Overview</button>
    <button class="tab" onclick="switchTab('allocator',this)">Allocator</button>
    <button class="tab" onclick="switchTab('payoff',this)">Payoff plan</button>
    <button class="tab" onclick="switchTab('history',this)">History</button>
  </div>

  <div id="section-overview" class="section active">
    <div class="card-list" id="card-list"></div>
  </div>

  <div id="section-allocator" class="section">
    <div class="alloc-outer" id="alloc-outer"></div>
  </div>

  <div id="section-payoff" class="section">
    <div class="scenario-controls">
      <div class="ctrl-label">Monthly debt budget — shared with allocator</div>
      <div class="ctrl-row">
        <div style="display:flex;align-items:baseline;gap:4px;flex:1">
          <span style="font-size:18px;color:var(--text2)">£</span>
          <input type="number" id="payoff-budget-input" min="0" step="10" style="font-size:22px;font-weight:500;width:120px;border:none;background:transparent;color:var(--text);font-family:inherit;outline:none">
        </div>
        <div style="font-size:12px;color:var(--text2);white-space:nowrap" id="payoff-budget-sub"></div>
        <div class="strat-pills">
          <button class="strat-pill on" onclick="setStrat('avalanche',this)">Avalanche</button>
          <button class="strat-pill" onclick="setStrat('snowball',this)">Snowball</button>
        </div>
      </div>
    </div>
    <div class="headline-grid" id="headline-grid"></div>
    <div class="phase-section-title">Your payoff journey</div>
    <div id="phases"></div>
    <div class="vs-banner" id="vs-banner"></div>
  </div>

  <div id="section-history" class="section">
    <div class="filter-row">
      <select id="filter-card" onchange="renderHistory()"><option value="all">All cards</option></select>
      <select id="filter-type" onchange="renderHistory()">
        <option value="all">All types</option>
        <option value="payment">Payments</option>
        <option value="charge">Charges</option>
      </select>
    </div>
    <div class="history-list" id="history-list"></div>
  </div>
</div>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-title">Log payment</div>
    <div class="modal-fields">
      <div class="field"><label>Card</label><select id="modal-card"></select></div>
      <div class="field"><label>Amount (£)</label><input type="number" id="modal-amount" placeholder="0.00" min="0" step="0.01"></div>
      <div class="field"><label>Date</label><input type="date" id="modal-date"></div>
      <div class="field"><label>Note (optional)</label><input type="text" id="modal-note" placeholder="e.g. minimum payment"></div>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="savePayment()">Save</button>
    </div>
  </div>
</div>

<script>
const STORAGE_KEY='debt_tracker_v2';
const CARD_DEFS=[
  {id:'ll7024',name:'Lloyds Bank',number:'7024',balance:3036.01,limit:6700,apr:26.94,minPayment:61,dueDay:20,color:'#e05050',trackColor:'#c0392b',iconBg:'#3a1a1a'},
  {id:'ms2384',name:'M&S Bank',number:'2384',balance:1049.32,limit:1300,apr:24.9,minPayment:25,dueDay:15,color:'#d4a030',trackColor:'#b8860b',iconBg:'#2e2510'},
  {id:'ll2250',name:'Lloyds Bank',number:'2250',balance:5122.84,limit:6200,apr:12.38,minPayment:103,dueDay:25,color:'#4ac080',trackColor:'#1a7a4a',iconBg:'#0e2418'},
];

function load(){try{const s=localStorage.getItem(STORAGE_KEY);return s?JSON.parse(s):{cards:CARD_DEFS.map(c=>({...c})),history:[]};}catch(e){return{cards:CARD_DEFS.map(c=>({...c})),history:[]};}}
function save(d){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(d));}catch(e){}}

let data=load();
let strat='avalanche';
let monthlyBudget=500;
let locks=CARD_DEFS.map(()=>false);

function totalMin(){return data.cards.reduce((s,c)=>s+c.minPayment,0);}
function extraAboveMin(){return Math.max(0,monthlyBudget-totalMin());}

function syncBudgetInputs(){
  const bi=document.getElementById('budget-input');
  const pi=document.getElementById('payoff-budget-input');
  const sub=document.getElementById('payoff-budget-sub');
  if(bi&&document.activeElement!==bi)bi.value=monthlyBudget;
  if(pi&&document.activeElement!==pi)pi.value=monthlyBudget;
  const ex=extraAboveMin();
  const tMin=totalMin();
  if(sub)sub.textContent=fmt(tMin)+' minimums + '+fmt(ex)+' extra';
}

let _budgetTimer=null;

function applyBudget(raw){
  const parsed=parseFloat(raw);
  if(isNaN(parsed)||parsed<=0)return;
  const tMin=totalMin();
  const newBudget=Math.max(tMin,parsed);
  const oldBudget=monthlyBudget;
  monthlyBudget=newBudget;

  if(newBudget<=tMin){
    allocs=data.cards.map(c=>c.minPayment);
  } else {
    const oldExtra=Math.max(0,oldBudget-tMin);
    const newExtra=newBudget-tMin;
    if(oldExtra>0){
      const ratios=allocs.map((a,i)=>(a-data.cards[i].minPayment)/oldExtra);
      allocs=data.cards.map((c,i)=>c.minPayment+Math.round(ratios[i]*newExtra));
    } else {
      const perCard=Math.floor(newExtra/data.cards.length);
      allocs=data.cards.map(c=>c.minPayment+perCard);
    }
    forceFullAllocation();
  }

  syncBudgetInputs();
  renderAllocator();
  renderPayoff();
}

function wireBudgetInput(el){

/* ── Allocator ── */
function mthsToPayoff(balance,apr,monthly){
  if(monthly<=0)return Infinity;
  const r=apr/100/12;
  if(r===0)return Math.ceil(balance/monthly);
  if(monthly<=balance*r)return Infinity;
  return Math.ceil(-Math.log(1-balance*r/monthly)/Math.log(1+r));
}
function intTotal(balance,apr,monthly){
  const m=mthsToPayoff(balance,apr,monthly);
  return m===Infinity?Infinity:Math.max(0,monthly*m-balance);
}

function totalMin(){return data.cards.reduce((s,c)=>s+c.minPayment,0);}

function forceFullAllocation(){
  const tMin=totalMin();
  if(monthlyBudget<tMin){allocs=data.cards.map(c=>c.minPayment);return;}
  let total=allocs.reduce((s,a)=>s+a,0);
  const diff=monthlyBudget-total;
  if(Math.abs(diff)>0){allocs[0]=Math.max(data.cards[0].minPayment,allocs[0]+diff);}
  total=allocs.reduce((s,a)=>s+a,0);
  if(total!==monthlyBudget){const rem=monthlyBudget-total;allocs[0]+=rem;}
}

function toggleLock(idx){

function setupDrag(idx, trackWrap, thumb, amtInput){
  function clientXToAlloc(clientX){
    const rect=trackWrap.getBoundingClientRect();
    const usable=rect.width-22;
    const x=Math.max(0,Math.min(usable,clientX-rect.left-11));
    const raw=Math.round(x/usable*monthlyBudget);
    return Math.max(data.cards[idx].minPayment,Math.min(monthlyBudget,raw));
  }

  function applyAndRedistribute(newVal){
    if(locks[idx])return;
    const oldVal=allocs[idx];
    const diff=newVal-oldVal;
    if(diff===0)return;
    const unlocked=data.cards.map((_,j)=>j).filter(j=>j!==idx&&!locks[j]);
    if(unlocked.length===0){allocs[idx]=oldVal;return;}
    allocs[idx]=newVal;
    const prevTotal=unlocked.reduce((s,j)=>s+allocs[j],0);
    const lockedTotal=data.cards.reduce((s,c,j)=>j!==idx&&locks[j]?s+allocs[j]:s,0);
    const newOtherTotal=monthlyBudget-newVal-lockedTotal;
    const minOtherTotal=unlocked.reduce((s,j)=>s+data.cards[j].minPayment,0);
    if(newOtherTotal<minOtherTotal){allocs[idx]=oldVal;return;}
    if(prevTotal>0){
      unlocked.forEach(j=>{
        allocs[j]=Math.max(data.cards[j].minPayment,Math.round(allocs[j]/prevTotal*newOtherTotal));
      });
    } else {
      const share=Math.floor(newOtherTotal/unlocked.length);
      unlocked.forEach(j=>{allocs[j]=Math.max(data.cards[j].minPayment,share);});
    }
    const remainder=monthlyBudget-allocs.reduce((s,a)=>s+a,0);
    if(remainder!==0){const adj=unlocked.find(j=>allocs[j]+remainder>=data.cards[j].minPayment);if(adj!==undefined)allocs[adj]+=remainder;}
    renderAllocator();
  }

  thumb.addEventListener('pointerdown',e=>{thumb.setPointerCapture(e.pointerId);e.preventDefault();});
  thumb.addEventListener('pointermove',e=>{if(!thumb.hasPointerCapture(e.pointerId))return;applyAndRedistribute(clientXToAlloc(e.clientX));});
  thumb.addEventListener('pointerup',e=>{thumb.releasePointerCapture(e.pointerId);});

  trackWrap.addEventListener('pointerdown',e=>{
    if(e.target===thumb)return;
    applyAndRedistribute(clientXToAlloc(e.clientX));
    thumb.setPointerCapture(e.pointerId);
    e.preventDefault();
  });
  trackWrap.addEventListener('pointermove',e=>{if(!thumb.hasPointerCapture(e.pointerId))return;applyAndRedistribute(clientXToAlloc(e.clientX));});
  trackWrap.addEventListener('pointerup',e=>{thumb.releasePointerCapture(e.pointerId);});

  if(amtInput){
    amtInput.addEventListener('change',function(){
      const v=parseFloat(this.value);
      if(!isNaN(v)) applyAndRedistribute(Math.max(data.cards[idx].minPayment,Math.min(monthlyBudget,Math.round(v))));
    });
    amtInput.addEventListener('keydown',function(e){if(e.key==='Enter')this.blur();});
    amtInput.addEventListener('focus',function(){this.select();});
  }
}


/* ── Payoff ── */
function simulate(extraAmt,strategy){
  const sim=data.cards.map(c=>({...c}));
  const totalMin=sim.reduce((s,c)=>s+c.minPayment,0);
  const budget=totalMin+extraAmt;
  let totalInt=0,months=0,phases=[],currentTarget=null,phaseStart=0,phaseIntStart=0;
  function getTarget(){
    const alive=sim.filter(c=>c.balance>0.01);if(!alive.length)return null;
    return strategy==='avalanche'?alive.reduce((a,b)=>b.apr>a.apr?b:a):alive.reduce((a,b)=>b.balance<a.balance?b:a);
  }
  currentTarget=getTarget();
  for(let m=0;m<360;m++){
    if(sim.every(c=>c.balance<=0.01))break;
    months=m+1;
    sim.forEach(c=>{if(c.balance>0.01){const int=c.balance*(c.apr/100/12);totalInt+=int;c.balance+=int;}});
    let rem=budget;
    sim.forEach(c=>{if(c.balance>0.01&&rem>0){const p=Math.min(c.minPayment,c.balance);c.balance=Math.max(0,c.balance-p);rem-=p;}});
    const t=getTarget();if(t&&rem>0){const r=sim.find(x=>x.id===t.id);if(r&&r.balance>0.01){r.balance=Math.max(0,r.balance-Math.min(rem,r.balance));}}
    const newTarget=getTarget();
    if((currentTarget?currentTarget.id:null)!==(newTarget?newTarget.id:null)){
      if(currentTarget){const orig=data.cards.find(c=>c.id===currentTarget.id);phases.push({card:orig,startMonth:phaseStart,endMonth:m,duration:m-phaseStart,intPaid:totalInt-phaseIntStart});}
      currentTarget=newTarget;phaseStart=m;phaseIntStart=totalInt;
    }
  }
  if(currentTarget){const orig=data.cards.find(c=>c.id===currentTarget.id);phases.push({card:orig,startMonth:phaseStart,endMonth:months,duration:months-phaseStart,intPaid:totalInt-phaseIntStart});}
  return{months,totalInt,phases,budget,totalMin};
}

  let entries=[...data.history];
  if(fc!=='all')entries=entries.filter(e=>e.cardId===fc);
  if(ft!=='all')entries=entries.filter(e=>e.type===ft);
  const list=document.getElementById('history-list');
  if(!entries.length){list.innerHTML='<div class="empty-state">No transactions logged yet.</div>';return;}
  list.innerHTML=entries.map(e=>`<div class="log-entry"><div><div class="log-note">${e.note||'Payment'}</div><div class="log-card">${e.cardName} ···· ${e.number} · <span class="log-date">${e.date}</span></div></div><div class="log-amount" style="color:${e.type==='payment'?'var(--ok)':'var(--danger)'}">${e.type==='payment'?'-':'+'}${fmtD(e.amount)}</div></div>`).join('');
}

function populateSelects(){
  const sel=document.getElementById('filter-card');sel.innerHTML='<option value="all">All cards</option>';
  data.cards.forEach(c=>{const o=document.createElement('option');o.value=c.id;o.textContent=c.name+' ···· '+c.number;sel.appendChild(o);});
}

/* ── Modal ── */
function openModal(){
  const sel=document.getElementById('modal-card');sel.innerHTML='';
  data.cards.forEach(c=>{const o=document.createElement('option');o.value=c.id;o.textContent=c.name+' ···· '+c.number;sel.appendChild(o);});
  document.getElementById('modal-date').value=new Date().toISOString().split('T')[0];
  document.getElementById('modal-amount').value='';document.getElementById('modal-note').value='';
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal(){document.getElementById('modal-overlay').classList.remove('open');}
function savePayment(){
  const cardId=document.getElementById('modal-card').value;
  const amount=parseFloat(document.getElementById('modal-amount').value);
  const date=document.getElementById('modal-date').value,note=document.getElementById('modal-note').value;
  if(!amount||amount<=0)return;
  const card=data.cards.find(c=>c.id===cardId);if(!card)return;
  card.balance=Math.max(0,card.balance-amount);
  data.history.unshift({cardId,cardName:card.name,number:card.number,amount,type:'payment',date,note});
  save(data);closeModal();renderSummary();renderCards();
}

function switchTab(name,btn){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  btn.classList.add('active');document.getElementById('section-'+name).classList.add('active');
  if(name==='allocator'){renderAllocator();syncBudgetInputs();}
  if(name==='payoff'){renderPayoff();syncBudgetInputs();}
  if(name==='history')renderHistory();
}

document.getElementById('modal-overlay').addEventListener('click',function(e){if(e.target===this)closeModal();});
wireBudgetInput(document.getElementById('payoff-budget-input'));
renderSummary();renderCards();populateSelects();
</script>
</body>
</html>
