<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Debt Tracker</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f5f5f3; --surface: #ffffff; --surface2: #f0efed;
    --border: rgba(0,0,0,0.1); --border2: rgba(0,0,0,0.18);
    --text: #1a1a1a; --text2: #6b6b6b; --text3: #9a9a9a;
    --radius: 12px; --radius-sm: 8px;
    --danger: #c0392b; --warn: #b8860b; --ok: #1a7a4a;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #141414; --surface: #1e1e1e; --surface2: #272727;
      --border: rgba(255,255,255,0.1); --border2: rgba(255,255,255,0.18);
      --text: #f0f0f0; --text2: #a0a0a0; --text3: #666;
      --danger: #e05a4a; --warn: #d4a030; --ok: #3ab870;
    }
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 0 0 4rem; }
  .app-header { background: var(--surface); border-bottom: 0.5px solid var(--border); padding: 1.25rem 1.5rem; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 50; }
  .app-title { font-size: 18px; font-weight: 500; }
  .app-sub { font-size: 12px; color: var(--text2); margin-top: 2px; }
  .btn { padding: 8px 16px; border-radius: var(--radius-sm); border: 0.5px solid var(--border2); font-size: 13px; cursor: pointer; background: transparent; color: var(--text); font-family: inherit; transition: background 0.15s; }
  .btn:hover { background: var(--surface2); }
  .btn-primary { background: var(--text); color: var(--bg); border-color: transparent; }
  .btn-primary:hover { opacity: 0.85; }
  .btn-sm { padding: 5px 12px; font-size: 12px; }
  .container { max-width: 680px; margin: 0 auto; padding: 1.5rem 1rem; }
  .summary-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 1.25rem; }
  @media (min-width: 480px) { .summary-grid { grid-template-columns: repeat(4, 1fr); } }
  .metric { background: var(--surface2); border-radius: var(--radius-sm); padding: 0.85rem 1rem; }
  .metric-label { font-size: 11px; color: var(--text2); margin-bottom: 4px; }
  .metric-value { font-size: 18px; font-weight: 500; }
  .metric-value.danger { color: var(--danger); }
  .metric-value.warn { color: var(--warn); }
  .metric-value.ok { color: var(--ok); }
  .tabs { display: flex; gap: 6px; margin-bottom: 1rem; overflow-x: auto; padding-bottom: 2px; }
  .tab { padding: 6px 16px; border-radius: 20px; border: 0.5px solid var(--border2); font-size: 13px; cursor: pointer; background: transparent; color: var(--text2); white-space: nowrap; font-family: inherit; transition: all 0.15s; }
  .tab.active { background: var(--text); color: var(--bg); border-color: transparent; }
  .section { display: none; }
  .section.active { display: block; }

  /* Overview */
  .card-list { display: flex; flex-direction: column; gap: 10px; }
  .card { background: var(--surface); border-radius: var(--radius); border: 0.5px solid var(--border); overflow: hidden; }
  .card-header { display: flex; justify-content: space-between; align-items: center; padding: 1rem 1.1rem; cursor: pointer; user-select: none; }
  .card-name { font-size: 14px; font-weight: 500; }
  .card-num { font-size: 12px; color: var(--text2); margin-top: 2px; }
  .card-right { text-align: right; }
  .card-balance { font-size: 20px; font-weight: 500; }
  .card-avail { font-size: 12px; color: var(--text2); }
  .apr-badge { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 20px; margin-left: 6px; vertical-align: middle; }
  .apr-high { background: #fce8e8; color: #a32d2d; }
  .apr-mid { background: #faeeda; color: #854f0b; }
  .apr-low { background: #eaf3de; color: #3b6d11; }
  .card-body { padding: 0 1.1rem 1rem; border-top: 0.5px solid var(--border); }
  .card-body.hidden { display: none; }
  .bar-wrap { margin-top: 0.85rem; }
  .bar-label { display: flex; justify-content: space-between; font-size: 12px; color: var(--text2); margin-bottom: 4px; }
  .bar-bg { height: 6px; background: var(--surface2); border-radius: 3px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 3px; }
  .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 0.85rem; }
  .stat-box { background: var(--surface2); border-radius: var(--radius-sm); padding: 0.6rem 0.75rem; }
  .stat-label { font-size: 11px; color: var(--text2); }
  .stat-val { font-size: 14px; font-weight: 500; margin-top: 2px; }
  .update-row { display: flex; align-items: center; gap: 8px; margin-top: 1rem; padding-top: 0.85rem; border-top: 0.5px solid var(--border); flex-wrap: wrap; }
  .update-row label { font-size: 12px; color: var(--text2); }
  .update-row input { flex: 1; min-width: 100px; padding: 6px 10px; font-size: 13px; border-radius: var(--radius-sm); border: 0.5px solid var(--border2); background: var(--surface); color: var(--text); font-family: inherit; }

  /* Allocator */
  .alloc-controls { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 1.25rem; padding: 1rem 1.25rem; background: var(--surface); border-radius: var(--radius); border: 0.5px solid var(--border); }
  .alloc-controls label { font-size: 13px; color: var(--text2); white-space: nowrap; }
  .alloc-controls input { width: 110px; padding: 6px 10px; font-size: 15px; border-radius: var(--radius-sm); border: 0.5px solid var(--border2); background: var(--surface); color: var(--text); font-family: inherit; }
  .pill-btn { padding: 6px 14px; border-radius: 20px; border: 0.5px solid var(--border2); font-size: 12px; cursor: pointer; background: transparent; color: var(--text2); font-family: inherit; }
  .pill-btn:hover { background: var(--surface2); }
  .alloc-summary { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 10px; margin-bottom: 1.25rem; }
  .track-wrap { margin-bottom: 1.25rem; }
  .track-label { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px; }
  .track-name { font-size: 13px; font-weight: 500; }
  .track-meta { font-size: 11px; color: var(--text2); }
  .track-bar { position: relative; height: 38px; background: var(--surface2); border-radius: var(--radius-sm); cursor: pointer; user-select: none; touch-action: none; overflow: hidden; }
  .track-fill { position: absolute; left: 0; top: 0; bottom: 0; border-radius: var(--radius-sm); }
  .track-min-line { position: absolute; top: 0; bottom: 0; width: 2px; background: rgba(255,255,255,0.4); pointer-events: none; z-index: 1; }
  .track-handle { position: absolute; right: -1px; top: 50%; transform: translateY(-50%); width: 14px; height: 28px; background: var(--surface); border: 0.5px solid var(--border2); border-radius: 4px; cursor: grab; z-index: 2; display: flex; align-items: center; justify-content: center; touch-action: none; }
  .track-handle:active { cursor: grabbing; }
  .handle-lines { display: flex; flex-direction: column; gap: 3px; }
  .handle-line { width: 4px; height: 1px; background: var(--text3); border-radius: 1px; }
  .track-amount { position: absolute; left: 50%; top: 50%; transform: translate(-50%,-50%); font-size: 12px; font-weight: 500; color: var(--text); pointer-events: none; white-space: nowrap; }
  .track-stats { display: grid; grid-template-columns: repeat(3,1fr); gap: 6px; margin-top: 6px; }
  .ts { background: var(--surface2); border-radius: var(--radius-sm); padding: 5px 8px; }
  .ts-label { font-size: 11px; color: var(--text2); }
  .ts-val { font-size: 12px; font-weight: 500; color: var(--text); margin-top: 1px; }
  .unalloc-row { margin-top: 0.5rem; }
  .unalloc-labels { display: flex; justify-content: space-between; font-size: 12px; color: var(--text2); margin-bottom: 4px; }
  .unalloc-bg { height: 6px; background: var(--surface2); border-radius: 3px; overflow: hidden; }
  .unalloc-fill { height: 100%; border-radius: 3px; transition: width 0.08s; }

  /* Payoff */
  .scenario-controls { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 1rem 1.25rem; margin-bottom: 1.25rem; }
  .ctrl-label { font-size: 12px; color: var(--text2); margin-bottom: 8px; }
  .ctrl-row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .extra-display { font-size: 22px; font-weight: 500; min-width: 60px; }
  .strat-pills { display: flex; gap: 6px; }
  .strat-pill { padding: 5px 12px; border-radius: 20px; border: 0.5px solid var(--border2); font-size: 12px; cursor: pointer; background: transparent; color: var(--text2); font-family: inherit; transition: all 0.15s; }
  .strat-pill.on { background: var(--text); color: var(--bg); border-color: transparent; }
  .headline-grid { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 10px; margin-bottom: 1.25rem; }
  .hl-card { background: var(--surface2); border-radius: var(--radius-sm); padding: 0.85rem 1rem; }
  .hl-label { font-size: 11px; color: var(--text2); margin-bottom: 4px; }
  .hl-val { font-size: 20px; font-weight: 500; }
  .hl-val.good { color: var(--ok); } .hl-val.bad { color: var(--danger); } .hl-val.warn { color: var(--warn); }
  .hl-sub { font-size: 11px; color: var(--text2); margin-top: 3px; }
  .phase-section-title { font-size: 13px; font-weight: 500; margin-bottom: 0.75rem; }
  .phase { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 1rem 1.25rem; margin-bottom: 10px; position: relative; overflow: hidden; }
  .phase-accent { position: absolute; left: 0; top: 0; bottom: 0; width: 3px; }
  .phase-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
  .phase-step { display: inline-flex; align-items: center; justify-content: center; width: 22px; height: 22px; border-radius: 50%; font-size: 11px; font-weight: 500; flex-shrink: 0; margin-right: 8px; }
  .phase-name { font-size: 14px; font-weight: 500; }
  .phase-tag { font-size: 11px; padding: 2px 8px; border-radius: 20px; display: inline-block; margin-top: 3px; }
  .phase-duration { font-size: 13px; font-weight: 500; color: var(--text2); text-align: right; white-space: nowrap; }
  .phase-body { margin-top: 0.85rem; padding-top: 0.85rem; border-top: 0.5px solid var(--border); }
  .phase-split { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .ps-box { background: var(--surface2); border-radius: var(--radius-sm); padding: 0.6rem 0.75rem; }
  .ps-label { font-size: 11px; color: var(--text2); }
  .ps-val { font-size: 13px; font-weight: 500; margin-top: 2px; }
  .what-happens { margin-top: 0.75rem; font-size: 12px; color: var(--text2); line-height: 1.6; padding: 0.6rem 0.75rem; background: var(--surface2); border-radius: var(--radius-sm); }
  .what-happens strong { font-weight: 500; color: var(--text); }
  .pb-wrap { margin-top: 0.75rem; }
  .pb-labels { display: flex; justify-content: space-between; font-size: 11px; color: var(--text2); margin-bottom: 4px; }
  .pb-bg { height: 5px; background: var(--surface2); border-radius: 3px; overflow: hidden; }
  .pb-fill { height: 100%; border-radius: 3px; }
  .vs-banner { background: var(--surface2); border-radius: var(--radius); padding: 1rem 1.25rem; margin-top: 1.25rem; }
  .vs-grid { display: grid; grid-template-columns: 1fr auto 1fr; gap: 12px; align-items: center; }
  .vs-col { text-align: center; }
  .vs-label { font-size: 11px; color: var(--text2); margin-bottom: 4px; }
  .vs-val { font-size: 18px; font-weight: 500; }
  .vs-sub { font-size: 11px; color: var(--text2); margin-top: 2px; }
  .vs-divider { font-size: 12px; color: var(--text2); text-align: center; }
  .vs-save { text-align: center; padding: 0.65rem 1rem; background: var(--surface); border-radius: var(--radius-sm); border: 0.5px solid var(--border); font-size: 12px; color: var(--text2); margin-top: 0.75rem; line-height: 1.6; }
  .vs-save strong { font-weight: 500; }

  /* History */
  .filter-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 0.85rem; }
  .filter-row select { padding: 6px 10px; font-size: 13px; border-radius: var(--radius-sm); border: 0.5px solid var(--border2); background: var(--surface); color: var(--text); font-family: inherit; }
  .history-list { background: var(--surface); border-radius: var(--radius); border: 0.5px solid var(--border); overflow: hidden; }
  .log-entry { display: flex; justify-content: space-between; align-items: center; padding: 0.85rem 1.1rem; border-bottom: 0.5px solid var(--border); font-size: 13px; }
  .log-entry:last-child { border-bottom: none; }
  .log-note { font-weight: 500; }
  .log-card { font-size: 11px; color: var(--text2); margin-top: 2px; }
  .log-date { font-size: 11px; color: var(--text3); }
  .log-amount { font-weight: 500; font-size: 14px; }
  .empty-state { padding: 2.5rem; text-align: center; font-size: 13px; color: var(--text2); }

  /* Modal */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; align-items: center; justify-content: center; padding: 1rem; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface); border-radius: var(--radius); padding: 1.5rem; width: 100%; max-width: 340px; border: 0.5px solid var(--border2); }
  .modal-title { font-size: 16px; font-weight: 500; margin-bottom: 1rem; }
  .field { display: flex; flex-direction: column; gap: 4px; }
  .field label { font-size: 12px; color: var(--text2); }
  .field input, .field select { padding: 8px 10px; font-size: 13px; border-radius: var(--radius-sm); border: 0.5px solid var(--border2); background: var(--surface); color: var(--text); font-family: inherit; width: 100%; }
  .modal-fields { display: flex; flex-direction: column; gap: 12px; }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 1.25rem; }
</style>
</head>
<body>

<div class="app-header">
  <div>
    <div class="app-title">Debt tracker</div>
    <div class="app-sub">3 cards · all APRs confirmed</div>
  </div>
  <button class="btn btn-primary btn-sm" onclick="openModal()">+ Log payment</button>
</div>

<div class="container">
  <div class="summary-grid" id="summary-grid"></div>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('overview',this)">Overview</button>
    <button class="tab" onclick="switchTab('allocator',this)">Allocator</button>
    <button class="tab" onclick="switchTab('payoff',this)">Payoff plan</button>
    <button class="tab" onclick="switchTab('history',this)">History</button>
  </div>

  <div id="section-overview" class="section active">
    <div class="card-list" id="card-list"></div>
  </div>

  <div id="section-allocator" class="section">
    <div class="alloc-controls">
      <label>Monthly budget (£)</label>
      <input type="number" id="budget-input" value="400" min="0" step="10" oninput="setBudget(this.value)">
      <button class="pill-btn" onclick="setMinsOnly()">Set to minimums</button>
      <button class="pill-btn" onclick="resetEqual()">Split equally</button>
    </div>
    <div class="alloc-summary" id="alloc-summary"></div>
    <div id="tracks"></div>
    <div class="unalloc-row">
      <div class="unalloc-labels" id="unalloc-labels"></div>
      <div class="unalloc-bg"><div class="unalloc-fill" id="unalloc-fill"></div></div>
    </div>
  </div>

  <div id="section-payoff" class="section">
    <div class="scenario-controls">
      <div class="ctrl-label">Extra monthly payment on top of minimums</div>
      <div class="ctrl-row">
        <input type="range" min="0" max="800" step="10" value="200" id="extra-slider" style="flex:1;min-width:120px" oninput="onSlider(this.value)">
        <div class="extra-display" id="extra-disp">£200</div>
        <div class="strat-pills">
          <button class="strat-pill on" onclick="setStrat('avalanche',this)">Avalanche</button>
          <button class="strat-pill" onclick="setStrat('snowball',this)">Snowball</button>
        </div>
      </div>
    </div>
    <div class="headline-grid" id="headline-grid"></div>
    <div class="phase-section-title">Your payoff journey</div>
    <div id="phases"></div>
    <div class="vs-banner" id="vs-banner"></div>
  </div>

  <div id="section-history" class="section">
    <div class="filter-row">
      <select id="filter-card" onchange="renderHistory()"><option value="all">All cards</option></select>
      <select id="filter-type" onchange="renderHistory()">
        <option value="all">All types</option>
        <option value="payment">Payments</option>
        <option value="charge">Charges</option>
      </select>
    </div>
    <div class="history-list" id="history-list"></div>
  </div>
</div>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-title">Log payment</div>
    <div class="modal-fields">
      <div class="field"><label>Card</label><select id="modal-card"></select></div>
      <div class="field"><label>Amount (£)</label><input type="number" id="modal-amount" placeholder="0.00" min="0" step="0.01"></div>
      <div class="field"><label>Date</label><input type="date" id="modal-date"></div>
      <div class="field"><label>Note (optional)</label><input type="text" id="modal-note" placeholder="e.g. minimum payment"></div>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="savePayment()">Save</button>
    </div>
  </div>
</div>

<script>
const STORAGE_KEY='debt_tracker_v2';
const CARD_DEFS=[
  {id:'ll7024',name:'Lloyds Bank',number:'7024',balance:3036.01,limit:6700,apr:26.94,minPayment:61,dueDay:20,color:'#c0392b',bg:'#fce8e8',text:'#a32d2d'},
  {id:'ms2384',name:'M&S Bank',number:'2384',balance:1049.32,limit:1300,apr:24.9,minPayment:25,dueDay:15,color:'#b8860b',bg:'#faeeda',text:'#854f0b'},
  {id:'ll2250',name:'Lloyds Bank',number:'2250',balance:5122.84,limit:6200,apr:12.38,minPayment:103,dueDay:25,color:'#1a7a4a',bg:'#eaf3de',text:'#3b6d11'},
];

function load(){try{const s=localStorage.getItem(STORAGE_KEY);return s?JSON.parse(s):{cards:CARD_DEFS.map(c=>({...c})),history:[]};}catch(e){return{cards:CARD_DEFS.map(c=>({...c})),history:[]};}}
function save(d){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(d));}catch(e){}}

let data=load();
let strat='avalanche',extra=200;
let allocBudget=400;
let allocs=CARD_DEFS.map(c=>c.minPayment);

function fmt(n){return'£'+Math.abs(n).toLocaleString('en-GB',{minimumFractionDigits:0,maximumFractionDigits:0});}
function fmtD(n){return'£'+Math.abs(n).toLocaleString('en-GB',{minimumFractionDigits:2,maximumFractionDigits:2});}
function aprClass(a){return a>=24?'apr-high':a>=16?'apr-mid':'apr-low';}
function mi(c){return c.balance*(c.apr/100/12);}

/* ── Overview ── */
function renderSummary(){
  const total=data.cards.reduce((s,c)=>s+c.balance,0);
  const tInt=data.cards.reduce((s,c)=>s+mi(c),0);
  const tMin=data.cards.reduce((s,c)=>s+c.minPayment,0);
  const tAvail=data.cards.reduce((s,c)=>s+(c.limit-c.balance),0);
  document.getElementById('summary-grid').innerHTML=`
    <div class="metric"><div class="metric-label">Total debt</div><div class="metric-value danger">${fmtD(total)}</div></div>
    <div class="metric"><div class="metric-label">Monthly interest</div><div class="metric-value warn">${fmtD(tInt)}</div></div>
    <div class="metric"><div class="metric-label">Min payments</div><div class="metric-value">${fmtD(tMin)}</div></div>
    <div class="metric"><div class="metric-label">Available credit</div><div class="metric-value ok">${fmtD(tAvail)}</div></div>`;
}

function renderCards(){
  const el=document.getElementById('card-list');el.innerHTML='';
  data.cards.forEach((card,i)=>{
    const used=card.balance/card.limit*100,avail=card.limit-card.balance;
    const barC=used>80?'#c0392b':used>60?'#b8860b':'#1a7a4a';
    const d=document.createElement('div');d.className='card';
    d.innerHTML=`<div class="card-header" onclick="toggleCard(${i})">
      <div><div class="card-name">${card.name} <span class="apr-badge ${aprClass(card.apr)}">${card.apr}% APR</span></div><div class="card-num">···· ${card.number}</div></div>
      <div class="card-right"><div class="card-balance">${fmtD(card.balance)}</div><div class="card-avail">${fmtD(avail)} available</div></div>
    </div>
    <div class="card-body hidden" id="cb-${i}">
      <div class="bar-wrap"><div class="bar-label"><span>Credit used</span><span>${used.toFixed(0)}%</span></div><div class="bar-bg"><div class="bar-fill" style="width:${Math.min(used,100)}%;background:${barC}"></div></div></div>
      <div class="stat-grid">
        <div class="stat-box"><div class="stat-label">Monthly interest</div><div class="stat-val">${fmtD(mi(card))}</div></div>
        <div class="stat-box"><div class="stat-label">Min payment</div><div class="stat-val">${fmtD(card.minPayment)}</div></div>
        <div class="stat-box"><div class="stat-label">Due day</div><div class="stat-val">${card.dueDay}th</div></div>
      </div>
      <div class="stat-grid">
        <div class="stat-box"><div class="stat-label">Credit limit</div><div class="stat-val">${fmtD(card.limit)}</div></div>
        <div class="stat-box"><div class="stat-label">Utilisation</div><div class="stat-val">${used.toFixed(0)}%</div></div>
        <div class="stat-box"><div class="stat-label">Annual interest</div><div class="stat-val">${fmtD(mi(card)*12)}</div></div>
      </div>
      <div class="update-row">
        <label>Update balance (£)</label>
        <input type="number" id="nb-${i}" value="${card.balance.toFixed(2)}" step="0.01">
        <button class="btn btn-primary btn-sm" onclick="updateBalance(${i})">Update</button>
      </div>
    </div>`;
    el.appendChild(d);
  });
}

function toggleCard(i){document.getElementById('cb-'+i).classList.toggle('hidden');}
function updateBalance(i){
  const val=parseFloat(document.getElementById('nb-'+i).value);if(isNaN(val))return;
  const old=data.cards[i].balance;data.cards[i].balance=Math.max(0,val);
  if(val<old)data.history.unshift({cardId:data.cards[i].id,cardName:data.cards[i].name,number:data.cards[i].number,amount:+(old-val).toFixed(2),type:'payment',date:new Date().toISOString().split('T')[0],note:'Balance update'});
  save(data);renderSummary();renderCards();
}

/* ── Allocator ── */
function mthsToPayoff(balance,apr,monthly){
  if(monthly<=0)return Infinity;
  const r=apr/100/12;
  if(r===0)return Math.ceil(balance/monthly);
  if(monthly<=balance*r)return Infinity;
  return Math.ceil(-Math.log(1-balance*r/monthly)/Math.log(1+r));
}
function intTotal(balance,apr,monthly){
  const m=mthsToPayoff(balance,apr,monthly);
  return m===Infinity?Infinity:Math.max(0,monthly*m-balance);
}

function setBudget(v){
  allocBudget=Math.max(0,parseFloat(v)||0);
  const totalMin=data.cards.reduce((s,c)=>s+c.minPayment,0);
  if(allocBudget<totalMin){allocs=data.cards.map(c=>c.minPayment);}
  else{
    const cur=allocs.reduce((s,a)=>s+a,0);
    if(cur>0){const scale=allocBudget/cur;allocs=allocs.map((a,i)=>Math.max(data.cards[i].minPayment,Math.round(a*scale)));}
    clampAllocs();
  }
  renderAllocator();
}

function clampAllocs(){
  let total=allocs.reduce((s,a)=>s+a,0);
  for(let i=data.cards.length-1;i>=0&&total>allocBudget;i--){
    const cut=Math.min(allocs[i]-data.cards[i].minPayment,total-allocBudget);
    allocs[i]-=cut;total-=cut;
  }
}

function setMinsOnly(){
  const totalMin=data.cards.reduce((s,c)=>s+c.minPayment,0);
  allocBudget=totalMin;
  document.getElementById('budget-input').value=totalMin;
  allocs=data.cards.map(c=>c.minPayment);
  renderAllocator();
}

function resetEqual(){
  const totalMin=data.cards.reduce((s,c)=>s+c.minPayment,0);
  const extra=Math.max(0,allocBudget-totalMin);
  const perCard=Math.floor(extra/data.cards.length);
  allocs=data.cards.map(c=>c.minPayment+perCard);
  const leftover=allocBudget-allocs.reduce((s,a)=>s+a,0);
  if(leftover>0)allocs[0]+=leftover;
  renderAllocator();
}

function renderAllocator(){
  const totalInt=data.cards.reduce((s,c,i)=>s+intTotal(c.balance,c.apr,allocs[i]),0);
  const maxM=Math.max(...data.cards.map((c,i)=>mthsToPayoff(c.balance,c.apr,allocs[i])));
  const totalAlloc=allocs.reduce((s,a)=>s+a,0);
  const unalloc=Math.max(0,allocBudget-totalAlloc);

  document.getElementById('alloc-summary').innerHTML=`
    <div class="metric"><div class="metric-label">Monthly budget</div><div class="metric-value">${fmt(allocBudget)}</div></div>
    <div class="metric"><div class="metric-label">Total interest</div><div class="metric-value danger">${totalInt===Infinity?'n/a':fmt(totalInt)}</div></div>
    <div class="metric"><div class="metric-label">Debt free</div><div class="metric-value ${maxM===Infinity?'danger':'ok'}">${maxM===Infinity?'never':Math.floor(maxM/12)+'y '+maxM%12+'m'}</div></div>`;

  const tracksEl=document.getElementById('tracks');tracksEl.innerHTML='';
  data.cards.forEach((card,i)=>{
    const def=CARD_DEFS.find(d=>d.id===card.id)||CARD_DEFS[i];
    const alloc=allocs[i];
    const pct=allocBudget>0?Math.min(100,alloc/allocBudget*100):0;
    const minPct=allocBudget>0?Math.min(100,card.minPayment/allocBudget*100):0;
    const months=mthsToPayoff(card.balance,card.apr,alloc);
    const intPd=intTotal(card.balance,card.apr,alloc);
    const extraAmt=alloc-card.minPayment;

    const wrap=document.createElement('div');wrap.className='track-wrap';
    wrap.innerHTML=`
      <div class="track-label">
        <div><span class="track-name">${card.name} ···· ${card.number}</span> <span style="font-size:11px;padding:2px 7px;border-radius:20px;background:${def.bg};color:${def.color};margin-left:6px">${card.apr}% APR</span></div>
        <div class="track-meta">${fmt(card.balance)} balance</div>
      </div>
      <div class="track-bar" id="abar-${i}">
        <div class="track-fill" id="afill-${i}" style="width:${pct}%;background:${def.color}"></div>
        <div class="track-min-line" style="left:${minPct}%"></div>
        <div class="track-amount" id="aamt-${i}">${fmtD(alloc)}/mo</div>
        <div class="track-handle" id="ahandle-${i}">
          <div class="handle-lines"><div class="handle-line"></div><div class="handle-line"></div><div class="handle-line"></div></div>
        </div>
      </div>
      <div class="track-stats">
        <div class="ts"><div class="ts-label">Minimum</div><div class="ts-val">${fmt(card.minPayment)}</div></div>
        <div class="ts"><div class="ts-label">Extra</div><div class="ts-val" style="color:${extraAmt>0?'var(--ok)':'var(--text2)'}">${extraAmt>0?'+'+fmt(extraAmt):'none'}</div></div>
        <div class="ts"><div class="ts-label">Paid off</div><div class="ts-val" style="color:${months===Infinity?'var(--danger)':'var(--text)'}">${months===Infinity?'never':months<12?months+'m':Math.floor(months/12)+'y '+months%12+'m'}</div></div>
      </div>`;
    tracksEl.appendChild(wrap);
    setupDrag(i,wrap);
  });

  const upct=allocBudget>0?Math.min(100,unalloc/allocBudget*100):0;
  const ucol=unalloc>50?'var(--warn)':unalloc>0?'var(--warn)':'var(--ok)';
  document.getElementById('unalloc-labels').innerHTML=`<span>${unalloc>0?fmt(unalloc)+' unallocated':'Fully allocated'}</span><span style="color:${ucol}">${Math.round(upct)}% remaining</span>`;
  document.getElementById('unalloc-fill').style.cssText=`width:${upct}%;background:${ucol}`;
}

function setupDrag(idx,wrap){
  const bar=wrap.querySelector('#abar-'+idx);
  const handle=wrap.querySelector('#ahandle-'+idx);

  function clientXToAlloc(clientX){
    const rect=bar.getBoundingClientRect();
    const pct=Math.max(0,Math.min(1,(clientX-rect.left)/rect.width));
    const raw=Math.round(pct*allocBudget);
    return Math.max(data.cards[idx].minPayment,Math.min(allocBudget,raw));
  }

  function apply(clientX){
    const newVal=clientXToAlloc(clientX);
    const diff=newVal-allocs[idx];
    allocs[idx]=newVal;
    if(diff>0){
      let excess=allocs.reduce((s,a)=>s+a,0)-allocBudget;
      for(let j=data.cards.length-1;j>=0&&excess>0;j--){
        if(j===idx)continue;
        const cut=Math.min(allocs[j]-data.cards[j].minPayment,excess);
        allocs[j]-=cut;excess-=cut;
      }
    }
    renderAllocator();
  }

  handle.addEventListener('pointerdown',e=>{
    handle.setPointerCapture(e.pointerId);
    e.preventDefault();
  });
  handle.addEventListener('pointermove',e=>{
    if(!handle.hasPointerCapture(e.pointerId))return;
    apply(e.clientX);
  });
  handle.addEventListener('pointerup',e=>{
    handle.releasePointerCapture(e.pointerId);
  });

  bar.addEventListener('pointerdown',e=>{
    if(e.target===handle)return;
    apply(e.clientX);
    handle.setPointerCapture(e.pointerId);
    e.preventDefault();
  });
  bar.addEventListener('pointermove',e=>{
    if(!handle.hasPointerCapture(e.pointerId))return;
    apply(e.clientX);
  });
  bar.addEventListener('pointerup',e=>{
    handle.releasePointerCapture(e.pointerId);
  });
}

/* ── Payoff ── */
function simulate(extraAmt,strategy){
  const sim=data.cards.map(c=>({...c}));
  const totalMin=sim.reduce((s,c)=>s+c.minPayment,0);
  const budget=totalMin+extraAmt;
  let totalInt=0,months=0,phases=[],currentTarget=null,phaseStart=0,phaseIntStart=0;
  function getTarget(){
    const alive=sim.filter(c=>c.balance>0.01);if(!alive.length)return null;
    return strategy==='avalanche'?alive.reduce((a,b)=>b.apr>a.apr?b:a):alive.reduce((a,b)=>b.balance<a.balance?b:a);
  }
  currentTarget=getTarget();
  for(let m=0;m<360;m++){
    if(sim.every(c=>c.balance<=0.01))break;
    months=m+1;
    sim.forEach(c=>{if(c.balance>0.01){const int=c.balance*(c.apr/100/12);totalInt+=int;c.balance+=int;}});
    let rem=budget;
    sim.forEach(c=>{if(c.balance>0.01&&rem>0){const p=Math.min(c.minPayment,c.balance);c.balance=Math.max(0,c.balance-p);rem-=p;}});
    const t=getTarget();if(t&&rem>0){const r=sim.find(x=>x.id===t.id);if(r&&r.balance>0.01){r.balance=Math.max(0,r.balance-Math.min(rem,r.balance));}}
    const newTarget=getTarget();
    if((currentTarget?currentTarget.id:null)!==(newTarget?newTarget.id:null)){
      if(currentTarget){const orig=data.cards.find(c=>c.id===currentTarget.id);phases.push({card:orig,startMonth:phaseStart,endMonth:m,duration:m-phaseStart,intPaid:totalInt-phaseIntStart});}
      currentTarget=newTarget;phaseStart=m;phaseIntStart=totalInt;
    }
  }
  if(currentTarget){const orig=data.cards.find(c=>c.id===currentTarget.id);phases.push({card:orig,startMonth:phaseStart,endMonth:months,duration:months-phaseStart,intPaid:totalInt-phaseIntStart});}
  return{months,totalInt,phases,budget,totalMin};
}

function renderPayoff(){
  const res=simulate(extra,strat),resMin=simulate(0,strat);
  const yrs=Math.floor(res.months/12),mos=res.months%12;
  const yrsMin=Math.floor(resMin.months/12),mosMin=resMin.months%12;
  const saved=resMin.totalInt-res.totalInt,monthsSaved=resMin.months-res.months;

  document.getElementById('headline-grid').innerHTML=`
    <div class="hl-card"><div class="hl-label">Debt free</div><div class="hl-val good">${yrs>0?yrs+'y ':''} ${mos}m</div><div class="hl-sub">${monthsSaved>0?monthsSaved+' months sooner':'at minimum payments'}</div></div>
    <div class="hl-card"><div class="hl-label">Total interest</div><div class="hl-val bad">${fmt(res.totalInt)}</div><div class="hl-sub">${saved>0?'saving '+fmt(saved):''}</div></div>
    <div class="hl-card"><div class="hl-label">Monthly outgoing</div><div class="hl-val warn">${fmt(res.budget)}</div><div class="hl-sub">${fmt(res.totalMin)} mins + £${extra} extra</div></div>`;

  const COLS=[
    {color:'#c0392b',fill:'#fce8e8',text:'#a32d2d'},
    {color:'#b8860b',fill:'#faeeda',text:'#854f0b'},
    {color:'#1a7a4a',fill:'#eaf3de',text:'#3b6d11'},
  ];
  let html='';
  res.phases.forEach((phase,i)=>{
    const c=phase.card,col=COLS[i]||COLS[2];
    const sd=new Date();sd.setMonth(sd.getMonth()+phase.startMonth);
    const ed=new Date();ed.setMonth(ed.getMonth()+phase.endMonth);
    const ss=sd.toLocaleDateString('en-GB',{month:'short',year:'numeric'});
    const es=ed.toLocaleDateString('en-GB',{month:'short',year:'numeric'});
    const pct=Math.round(phase.duration/res.months*100);
    const isLast=i===res.phases.length-1;
    const nextCard=!isLast?res.phases[i+1].card:null;
    const extraLine=extra>0?`Extra <strong>£${extra}/month</strong> fires at <strong>${c.name} (${c.apr}% APR)</strong> — your highest-rate debt`:`No extra payment this phase — minimums only`;
    const freedLine=!isLast?`When cleared, its <strong>£${fmt(c.minPayment)}/month</strong> minimum rolls into <strong>${nextCard.name}</strong> for phase ${i+2}`:`Final phase — freed minimums plus your extra all combine to finish it`;
    html+=`<div class="phase">
      <div class="phase-accent" style="background:${col.color}"></div>
      <div class="phase-head">
        <div style="display:flex;align-items:flex-start">
          <span class="phase-step" style="background:${col.fill};color:${col.text}">${i+1}</span>
          <div><div class="phase-name">${c.name} ···· ${c.number}</div><span class="phase-tag" style="background:${col.fill};color:${col.text}">${c.apr}% APR · ${fmtD(c.balance)} balance</span></div>
        </div>
        <div class="phase-duration">${phase.duration}m<br><span style="font-size:11px;font-weight:400">${ss} – ${es}</span></div>
      </div>
      <div class="phase-body">
        <div class="phase-split">
          <div class="ps-box"><div class="ps-label">Interest this phase</div><div class="ps-val">${fmt(phase.intPaid)}</div></div>
          <div class="ps-box"><div class="ps-label">Share of timeline</div><div class="ps-val">${pct}% (${phase.duration}mo)</div></div>
        </div>
        <div class="what-happens">${extraLine}<br>${freedLine}</div>
        <div class="pb-wrap">
          <div class="pb-labels"><span>Timeline</span><span>${phase.duration} of ${res.months} months</span></div>
          <div class="pb-bg"><div class="pb-fill" style="width:${pct}%;background:${col.color}"></div></div>
        </div>
      </div>
    </div>`;
  });
  document.getElementById('phases').innerHTML=html;
  document.getElementById('vs-banner').innerHTML=`
    <div class="vs-grid">
      <div class="vs-col"><div class="vs-label">With £${extra} extra</div><div class="vs-val" style="color:var(--ok)">${yrs>0?yrs+'y ':''} ${mos}m</div><div class="vs-sub">${fmt(res.totalInt)} interest</div></div>
      <div class="vs-divider">vs</div>
      <div class="vs-col"><div class="vs-label">Minimums only</div><div class="vs-val" style="color:var(--danger)">${yrsMin>0?yrsMin+'y ':''} ${mosMin}m</div><div class="vs-sub">${fmt(resMin.totalInt)} interest</div></div>
    </div>
    <div class="vs-save">The extra <strong>£${extra}/month</strong> saves you <strong style="color:var(--ok)">${fmt(saved)}</strong> in interest and clears everything <strong style="color:var(--ok)">${monthsSaved} months sooner</strong></div>`;
}

function onSlider(v){extra=parseInt(v);document.getElementById('extra-disp').textContent='£'+extra;renderPayoff();}
function setStrat(s,btn){strat=s;document.querySelectorAll('.strat-pill').forEach(b=>b.classList.remove('on'));btn.classList.add('on');renderPayoff();}

/* ── History ── */
function renderHistory(){
  const fc=document.getElementById('filter-card').value,ft=document.getElementById('filter-type').value;
  let entries=[...data.history];
  if(fc!=='all')entries=entries.filter(e=>e.cardId===fc);
  if(ft!=='all')entries=entries.filter(e=>e.type===ft);
  const list=document.getElementById('history-list');
  if(!entries.length){list.innerHTML='<div class="empty-state">No transactions logged yet.</div>';return;}
  list.innerHTML=entries.map(e=>`<div class="log-entry"><div><div class="log-note">${e.note||'Payment'}</div><div class="log-card">${e.cardName} ···· ${e.number} · <span class="log-date">${e.date}</span></div></div><div class="log-amount" style="color:${e.type==='payment'?'var(--ok)':'var(--danger)'}">${e.type==='payment'?'-':'+'}${fmtD(e.amount)}</div></div>`).join('');
}

function populateSelects(){
  const sel=document.getElementById('filter-card');sel.innerHTML='<option value="all">All cards</option>';
  data.cards.forEach(c=>{const o=document.createElement('option');o.value=c.id;o.textContent=c.name+' ···· '+c.number;sel.appendChild(o);});
}

/* ── Modal ── */
function openModal(){
  const sel=document.getElementById('modal-card');sel.innerHTML='';
  data.cards.forEach(c=>{const o=document.createElement('option');o.value=c.id;o.textContent=c.name+' ···· '+c.number;sel.appendChild(o);});
  document.getElementById('modal-date').value=new Date().toISOString().split('T')[0];
  document.getElementById('modal-amount').value='';document.getElementById('modal-note').value='';
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal(){document.getElementById('modal-overlay').classList.remove('open');}
function savePayment(){
  const cardId=document.getElementById('modal-card').value;
  const amount=parseFloat(document.getElementById('modal-amount').value);
  const date=document.getElementById('modal-date').value,note=document.getElementById('modal-note').value;
  if(!amount||amount<=0)return;
  const card=data.cards.find(c=>c.id===cardId);if(!card)return;
  card.balance=Math.max(0,card.balance-amount);
  data.history.unshift({cardId,cardName:card.name,number:card.number,amount,type:'payment',date,note});
  save(data);closeModal();renderSummary();renderCards();
}

function switchTab(name,btn){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  btn.classList.add('active');document.getElementById('section-'+name).classList.add('active');
  if(name==='allocator')renderAllocator();
  if(name==='payoff')renderPayoff();
  if(name==='history')renderHistory();
}

document.getElementById('modal-overlay').addEventListener('click',function(e){if(e.target===this)closeModal();});
renderSummary();renderCards();populateSelects();
</script>
